<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audio Demo</title>
  <style>
    body{font-family:system-ui,sans-serif;max-width:900px;margin:30px auto;padding:0 16px}
    .row{display:grid;grid-template-columns:140px 1fr 1fr;gap:10px 16px;align-items:center;margin:14px 0}
    .hdr{font-weight:700;opacity:.8}
    audio{width:100%}
    .tag{font-weight:600}
  </style>
</head>
<body>
  <h2>Audio Demo</h2>

  <div class="row">
    <div></div><div class="hdr">Noisy</div><div class="hdr">Enhanced</div>
  </div>

  <div class="row">
    <div class="tag">Sample 01</div>
    <audio controls preload="none">
      <source src="assets/audio/s01_noisy.wav" type="audio/wav">
    </audio>
    <audio controls preload="none">
      <source src="assets/audio/s01_enh.mp3" type="audio/mpeg">
    </audio>
  </div>
</body>
</html>
